name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "dystoppia/**"
      - "infra/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

env:
  ACR_NAME: dystoppiaacr
  APP_NAME: dystoppia-prod-app
  RG: rg-dystoppia-prod
  NEXT_PUBLIC_APP_URL: https://www.dystoppia.com
  DYSTOPPIA_ENABLE_RESEARCH_EXECUTOR: "false"
  NEXT_TELEMETRY_DISABLED: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dystoppia
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dystoppia/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build app
        run: npm run build

  deploy:
    name: Build & Deploy
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: dystoppia
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login --name $ACR_NAME

      - name: Deploy monitoring (Log Analytics, App Insights, diagnostics)
        working-directory: ${{ github.workspace }}
        run: |
          set -e
          az deployment group create \
            --resource-group "$RG" \
            --name "dystoppia-monitoring" \
            --template-file infra/monitoring.bicep \
            --parameters webAppName="$APP_NAME"
          CONN=$(az deployment group show \
            --resource-group "$RG" \
            --name "dystoppia-monitoring" \
            --query "properties.outputs.connectionString.value" \
            -o tsv)
          az webapp config appsettings set \
            --resource-group "$RG" \
            --name "$APP_NAME" \
            --settings APPLICATIONINSIGHTS_CONNECTION_STRING="$CONN"

      - name: Set production app settings
        run: |
          az webapp config appsettings set \
            --resource-group "$RG" \
            --name "$APP_NAME" \
            --settings \
              NEXT_PUBLIC_APP_URL="$NEXT_PUBLIC_APP_URL" \
              DYSTOPPIA_ENABLE_RESEARCH_EXECUTOR="$DYSTOPPIA_ENABLE_RESEARCH_EXECUTOR"

      - name: Set image tag
        id: tag
        run: echo "value=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        run: |
          docker build \
            -t $ACR_NAME.azurecr.io/dystoppia:${{ steps.tag.outputs.value }} \
            -t $ACR_NAME.azurecr.io/dystoppia:latest \
            .
          docker push $ACR_NAME.azurecr.io/dystoppia:${{ steps.tag.outputs.value }}
          docker push $ACR_NAME.azurecr.io/dystoppia:latest

      - name: Deploy to App Service
        run: |
          az webapp config container set \
            --name $APP_NAME \
            --resource-group $RG \
            --docker-custom-image-name $ACR_NAME.azurecr.io/dystoppia:${{ steps.tag.outputs.value }} \
            --docker-registry-server-url https://$ACR_NAME.azurecr.io

      - name: Restart app
        run: az webapp restart --name $APP_NAME --resource-group $RG

      - name: Show app URL
        id: app_url
        run: |
          FQDN=$(az webapp show \
            --name $APP_NAME \
            --resource-group $RG \
            --query "defaultHostName" \
            -o tsv)
          echo "$FQDN"
          echo "value=$FQDN" >> "$GITHUB_OUTPUT"

      - name: Smoke test
        run: |
          set -e
          BASE="https://${{ steps.app_url.outputs.value }}"
          # Azure returns HTTP 503 + HTML "Application Error" when the container never binds — do NOT treat 503 as success.
          # Retry 404/502 while the new image rolls out; require 200 + JSON from our route.
          for i in $(seq 1 36); do
            code=$(curl -sS -o /tmp/health.body -w "%{http_code}" "$BASE/api/health" || echo "000")
            if [ "$code" = "200" ] && grep -qE '"ok"[[:space:]]*:[[:space:]]*true' /tmp/health.body; then
              echo "OK: GET /api/health -> HTTP $code"
              cat /tmp/health.body
              exit 0
            fi
            echo "attempt $i: HTTP $code (waiting for healthy app / rollout)..."
            sleep 10
          done
          echo "GET /api/health never returned 200 with ok:true (last body:)"
          cat /tmp/health.body 2>/dev/null || true
          exit 1
