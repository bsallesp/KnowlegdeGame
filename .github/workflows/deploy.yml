name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "dystoppia/**"
      - "infra/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

env:
  ACR_NAME: dystoppiaacr
  APP_NAME: dystoppia-prod-app
  RG: rg-dystoppia-prod
  NEXT_TELEMETRY_DISABLED: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dystoppia
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dystoppia/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build app
        run: npm run build

  deploy:
    name: Build & Deploy
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: dystoppia
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login --name $ACR_NAME

      - name: Deploy monitoring (Log Analytics, App Insights, diagnostics)
        working-directory: ${{ github.workspace }}
        run: |
          set -e
          az deployment group create \
            --resource-group "$RG" \
            --name "dystoppia-monitoring" \
            --template-file infra/monitoring.bicep \
            --parameters webAppName="$APP_NAME"
          CONN=$(az deployment group show \
            --resource-group "$RG" \
            --name "dystoppia-monitoring" \
            --query "properties.outputs.connectionString.value" \
            -o tsv)
          az webapp config appsettings set \
            --resource-group "$RG" \
            --name "$APP_NAME" \
            --settings APPLICATIONINSIGHTS_CONNECTION_STRING="$CONN"

      - name: Set image tag
        id: tag
        run: echo "value=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        run: |
          docker build \
            -t $ACR_NAME.azurecr.io/dystoppia:${{ steps.tag.outputs.value }} \
            -t $ACR_NAME.azurecr.io/dystoppia:latest \
            .
          docker push $ACR_NAME.azurecr.io/dystoppia:${{ steps.tag.outputs.value }}
          docker push $ACR_NAME.azurecr.io/dystoppia:latest

      - name: Deploy to App Service
        run: |
          az webapp config container set \
            --name $APP_NAME \
            --resource-group $RG \
            --docker-custom-image-name $ACR_NAME.azurecr.io/dystoppia:${{ steps.tag.outputs.value }} \
            --docker-registry-server-url https://$ACR_NAME.azurecr.io

      - name: Restart app
        run: az webapp restart --name $APP_NAME --resource-group $RG

      - name: Show app URL
        id: app_url
        run: |
          FQDN=$(az webapp show \
            --name $APP_NAME \
            --resource-group $RG \
            --query "defaultHostName" \
            -o tsv)
          echo "$FQDN"
          echo "value=$FQDN" >> "$GITHUB_OUTPUT"

      - name: Smoke test
        run: |
          curl -fsS --retry 10 --retry-delay 10 "https://${{ steps.app_url.outputs.value }}/api/health"
