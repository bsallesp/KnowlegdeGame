# Runs on pull requests so regressions are caught before merge.
# Deploy workflow still runs tests on push to main before release.
name: CI

on:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dystoppia

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dystoppia/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
