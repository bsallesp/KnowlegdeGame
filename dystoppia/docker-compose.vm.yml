services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env.vm
    extra_hosts:
      # Allows the Next.js container to reach the vm-agent on the host at port 3333
      - "host.docker.internal:host-gateway"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env.vm
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
